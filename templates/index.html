<!DOCTYPE html> <html lang="pt-br"> 
    <head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Sistema de CEP</title> <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"> 
</head> 
<body> 
    <div class="container"> 
        <h1>Sistema de CEP</h1>
        <div class="formulario">
             <input type="text" id="cep" placeholder="Digite o CEP"> <button onclick="buscarCEP()">Buscar CEP</button> 
             <input type="text" id="logradouro" placeholder="Logradouro"> <input type="text" id="bairro" placeholder="Bairro"> 
             <input type="text" id="cidade" placeholder="Cidade">
              <input type="text" id="estado" placeholder="Estado"> <button onclick="salvarEndereco()">Salvar</button> 
            </div> 
            <h2>Endereços Cadastrados</h2> 
            <table> 
                <thead> 
                    <tr> <th>ID</th> 
                        <th>CEP</th> 
                        <th>Logradouro</th> 
                        <th>Bairro</th> 
                        <th>Cidade</th> 
                        <th>Estado</th> 
                    </tr> 
                </thead> 
                <tbody> {% for endereco in enderecos %} 
                    <tr> <td>{{ endereco.id }}</td>
                         <td>{{ endereco.cep }}</td> 
                         <td>{{ endereco.logradouro }}</td> 
                         <td>{{ endereco.bairro }}</td> 
                         <td>{{ endereco.cidade }}</td> 
                         <td>{{ endereco.estado }}</td> 
                        </tr> {% endfor %} </tbody> 
                    </table> 
                </div> 
                <script src="{{ url_for('static', filename='script.js') }}"></script> 
            </body> 
            </html>
